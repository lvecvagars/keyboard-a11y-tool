<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Accessibility Evaluator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    .header {
      background: #1e293b;
      color: #f1f5f9;
      padding: 20px 24px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
    }
    .header p {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* ---- Main ---- */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ---- Input form ---- */
    .input-section {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .input-section label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .input-row button {
      padding: 10px 24px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .input-row button:hover { background: #1d4ed8; }
    .input-row button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    /* ---- Progress panel ---- */
    .progress-section {
      display: none;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .progress-section.visible { display: block; }
    .progress-section h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-log {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 16px;
      font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
      font-size: 12px;
      line-height: 1.7;
      max-height: 320px;
      overflow-y: auto;
    }
    .progress-log .line {
      padding: 1px 0;
    }
    .progress-log .line.module-m1 { color: #60a5fa; }
    .progress-log .line.module-m2 { color: #a78bfa; }
    .progress-log .line.module-m3 { color: #34d399; }
    .progress-log .line.done { color: #4ade80; font-weight: 600; }
    .progress-log .line.error { color: #f87171; font-weight: 600; }
    .progress-log .line.info { color: #94a3b8; }

    /* ---- Result panel ---- */
    .result-section {
      display: none;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .result-section.visible { display: block; }
    .result-section h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .summary-card {
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 14px;
      text-align: center;
    }
    .summary-card .value {
      font-size: 26px;
      font-weight: 700;
    }
    .summary-card .label {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }
    .bar-bg {
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      margin-top: 8px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* Report links */
    .report-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .report-links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover { background: #e2e8f0; }

    /* ---- Error ---- */
    .error-banner {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      color: #991b1b;
      font-size: 14px;
    }
    .error-banner.visible { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Keyboard Accessibility Evaluator</h1>
    <p>Automated WCAG 2.2 keyboard accessibility evaluation — 13 checks across 3 modules</p>
  </div>

  <div class="container">

    <!-- URL input -->
    <div class="input-section">
      <label for="url-input">Page URL to evaluate</label>
      <div class="input-row">
        <input
          type="url"
          id="url-input"
          placeholder="https://example.com"
          value="https://example.com"
          autocomplete="url"
        >
        <button id="start-btn">Evaluate</button>
      </div>
    </div>

    <!-- Error banner -->
    <div class="error-banner" id="error-banner"></div>

    <!-- Progress log -->
    <div class="progress-section" id="progress-section">
      <h2>
        <div class="spinner" id="spinner"></div>
        <span id="progress-title">Evaluation in progress...</span>
      </h2>
      <div class="progress-log" id="progress-log"></div>
    </div>

    <!-- Results -->
    <div class="result-section" id="result-section">
      <h2>Results</h2>
      <div class="summary-grid" id="summary-grid"></div>
      <div class="report-links" id="report-links"></div>
    </div>

  </div>

  <script>
    const urlInput = document.getElementById("url-input");
    const startBtn = document.getElementById("start-btn");
    const errorBanner = document.getElementById("error-banner");
    const progressSection = document.getElementById("progress-section");
    const progressLog = document.getElementById("progress-log");
    const progressTitle = document.getElementById("progress-title");
    const spinner = document.getElementById("spinner");
    const resultSection = document.getElementById("result-section");
    const summaryGrid = document.getElementById("summary-grid");
    const reportLinks = document.getElementById("report-links");

    startBtn.addEventListener("click", startEvaluation);
    urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") startEvaluation();
    });

    function normalizeUrl(raw) {
      let url = raw.trim();
      if (!url) return "";
      if (!/^https?:\/\//i.test(url)) url = "https://" + url;
      return url;
    }

    function startEvaluation() {
      const raw = urlInput.value.trim();
      if (!raw) {
        showError("Please enter a URL.");
        return;
      }
      const url = normalizeUrl(raw);
      urlInput.value = url;

      // Reset UI
      hideError();
      progressLog.innerHTML = "";
      resultSection.classList.remove("visible");
      summaryGrid.innerHTML = "";
      reportLinks.innerHTML = "";
      progressSection.classList.add("visible");
      progressTitle.textContent = "Evaluation in progress...";
      spinner.style.display = "";
      startBtn.disabled = true;
      urlInput.disabled = true;

      addLogLine("Starting evaluation for " + url, "info");

      // Use fetch to POST, then read the response as an SSE stream.
      // We can't use EventSource here because EventSource only does GET.
      // Instead we use fetch + ReadableStream to parse the SSE format.
      fetch("/api/evaluate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      })
        .then((response) => {
          if (!response.ok) {
            // Non-SSE error (e.g. 400, 409)
            return response.json().then((data) => {
              throw new Error(data.error || "Server error");
            });
          }
          return readSSEStream(response.body);
        })
        .catch((err) => {
          showError(err.message);
          stopProgress();
        });
    }

    /**
     * Read an SSE stream from a fetch Response body.
     * Parses "data: {...}\n\n" messages and dispatches them.
     */
    async function readSSEStream(body) {
      const reader = body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        // SSE messages are separated by double newlines
        const parts = buffer.split("\n\n");
        // The last part might be incomplete — keep it in the buffer
        buffer = parts.pop() || "";

        for (const part of parts) {
          for (const line of part.split("\n")) {
            if (line.startsWith("data: ")) {
              try {
                const data = JSON.parse(line.slice(6));
                handleEvent(data);
              } catch {
                // Skip malformed lines
              }
            }
          }
        }
      }
    }

    function handleEvent(data) {
      switch (data.type) {
        case "progress":
          addLogLine(data.message, getModuleClass(data.message));
          break;

        case "complete":
          addLogLine(data.message, "done");
          stopProgress();
          showResults(data);
          break;

        case "error":
          addLogLine(data.message, "error");
          showError(data.message);
          stopProgress();
          break;
      }
    }

    /**
     * Determine a CSS class for color-coding log lines by module.
     */
    function getModuleClass(msg) {
      if (msg.startsWith("M1") || msg.includes("M1-")) return "module-m1";
      if (msg.startsWith("M2") || msg.includes("M2")) return "module-m2";
      if (msg.startsWith("M3") || msg.includes("M3")) return "module-m3";
      if (msg.startsWith("Done")) return "done";
      return "info";
    }

    function addLogLine(text, cssClass) {
      const div = document.createElement("div");
      div.className = "line " + (cssClass || "");
      div.textContent = text;
      progressLog.appendChild(div);
      progressLog.scrollTop = progressLog.scrollHeight;
    }

    function stopProgress() {
      startBtn.disabled = false;
      urlInput.disabled = false;
      spinner.style.display = "none";
      progressTitle.textContent = "Evaluation finished";
    }

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.add("visible");
    }

    function hideError() {
      errorBanner.classList.remove("visible");
      errorBanner.textContent = "";
    }

    function showResults(data) {
      const s = data.summary;
      if (!s) return;

      resultSection.classList.add("visible");

      const scoreColor = s.averageVisibilityScore >= 80 ? "#059669"
        : s.averageVisibilityScore >= 50 ? "#d97706" : "#dc2626";
      const coverageColor = s.keyboardCoveragePercent >= 95 ? "#059669"
        : s.keyboardCoveragePercent >= 80 ? "#d97706" : "#dc2626";

      summaryGrid.innerHTML = `
        <div class="summary-card">
          <div class="value">${s.totalTabStops}</div>
          <div class="label">Tab Stops</div>
        </div>
        <div class="summary-card">
          <div class="value" style="color:${s.criticalCount > 0 ? "#dc2626" : "#059669"}">${s.totalIssues}</div>
          <div class="label">Issues Found</div>
        </div>
        <div class="summary-card">
          <div class="value" style="color:${s.criticalCount > 0 ? "#dc2626" : "#059669"}">${s.criticalCount}</div>
          <div class="label">Critical</div>
        </div>
        <div class="summary-card">
          <div class="value" style="color:#d97706">${s.warningCount}</div>
          <div class="label">Warnings</div>
        </div>
        <div class="summary-card">
          <div class="value" style="color:${scoreColor}">${s.averageVisibilityScore}/100</div>
          <div class="label">Avg Visibility Score</div>
          <div class="bar-bg"><div class="bar-fill" style="width:${s.averageVisibilityScore}%;background:${scoreColor}"></div></div>
        </div>
        <div class="summary-card">
          <div class="value" style="color:${coverageColor}">${s.keyboardCoveragePercent}%</div>
          <div class="label">Keyboard Coverage</div>
          <div class="bar-bg"><div class="bar-fill" style="width:${s.keyboardCoveragePercent}%;background:${coverageColor}"></div></div>
        </div>
      `;

      reportLinks.innerHTML = `
        <a href="${data.htmlReportUrl}" target="_blank" class="btn-primary">Open HTML Report</a>
        <a href="${data.jsonReportUrl}" target="_blank" class="btn-secondary">Download JSON</a>
      `;
    }
  </script>

</body>
</html>
