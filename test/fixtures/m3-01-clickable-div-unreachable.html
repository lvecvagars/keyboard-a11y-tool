<!-- Div with role="button" and click handler but no tabindex. Expects ≥1 M3-01. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M3-01 clickable div unreachable</title>
  <style>
    body { font-family: sans-serif; padding: 24px; }
    a:focus, button:focus, .fake-button:focus {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }
    .fake-button {
      display: inline-block;
      padding: 8px 16px;
      background: #3b82f6;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
    }
    button { padding: 8px 16px; font-size: 14px; }
  </style>
</head>
<body>
  <button type="button" id="real">Real button (keyboard-reachable)</button>

  <p>The div below has role="button" and a click handler, but no tabindex:</p>

  <div role="button" class="fake-button" onclick="alert('clicked')">
    Fake button (unreachable)
  </div>
</body>
</html>
