<!-- Two buttons that trap focus between them via keydown. Expects ≥1 M1-02 critical. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M1-02 keyboard trap</title>
  <style>
    body { font-family: sans-serif; padding: 24px; }
    a:focus, button:focus { outline: 3px solid #2563eb; outline-offset: 2px; }
    .trap-zone { border: 2px solid #dc2626; padding: 16px; margin: 16px 0; border-radius: 4px; }
    button { padding: 8px 16px; margin: 4px; font-size: 14px; }
  </style>
</head>
<body>
  <a href="#before">Link before trap</a>

  <div class="trap-zone">
    <p>Focus gets stuck between these two buttons:</p>
    <button id="trap-1" type="button">Trapped button 1</button>
    <button id="trap-2" type="button">Trapped button 2</button>
  </div>

  <a href="#after">Link after trap (unreachable via Tab)</a>

  <script>
    const trap1 = document.getElementById('trap-1');
    const trap2 = document.getElementById('trap-2');

    document.addEventListener('keydown', (e) => {
      const active = document.activeElement;

      if (e.key === 'Tab') {
        if (!e.shiftKey && active === trap2) {
          e.preventDefault();
          trap1.focus();
        }
        if (e.shiftKey && active === trap1) {
          e.preventDefault();
          trap2.focus();
        }
      }
    });
  </script>
</body>
</html>
