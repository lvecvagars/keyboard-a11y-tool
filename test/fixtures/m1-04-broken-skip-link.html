<!--
  Skip link exists but points to #main-content which doesn't exist.
  The actual main content has id="content". Expects 1 M1-04 moderate.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M1-04 broken skip link</title>
  <style>
    body { font-family: sans-serif; padding: 24px; max-width: 600px; }
    a:focus, button:focus { outline: 3px solid #2563eb; outline-offset: 2px; }

    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #f1fa8c;
      color: #111;
      padding: 8px 16px;
      text-decoration: none;
      font-weight: bold;
    }
    .skip-link:focus { top: 0; }

    nav ul { list-style: none; padding: 0; display: flex; gap: 12px; }
    nav a { padding: 8px 12px; background: #f0f0f0; text-decoration: none;
            color: #111; border-radius: 4px; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <nav>
    <ul>
      <li><a href="#a">Link A</a></li>
      <li><a href="#b">Link B</a></li>
      <li><a href="#c">Link C</a></li>
    </ul>
  </nav>

  <!-- id is "content", not "main-content" — skip link target is broken -->
  <main id="content">
    <h1>Main content</h1>
    <p>The skip link above points to #main-content, but that id doesn't exist here.</p>
    <button type="button">A button in the main content</button>
  </main>
</body>
</html>
