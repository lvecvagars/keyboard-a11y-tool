<!--
  CSS grid with `order` properties that visually reverse DOM order.
  Tab sequence follows DOM (1→8) but visual layout is reversed (8→1),
  producing low Spearman correlation. Expects ≥1 M1-03 warning.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M1-03 reordered grid</title>
  <style>
    body { font-family: sans-serif; padding: 24px; }
    a:focus { outline: 3px solid #2563eb; outline-offset: 2px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 640px;
    }
    .grid a {
      display: block;
      padding: 24px;
      background: #e8e8e8;
      text-decoration: none;
      color: #111;
      text-align: center;
      font-weight: 600;
      border-radius: 4px;
    }

    .i1 { order: 8; }
    .i2 { order: 7; }
    .i3 { order: 6; }
    .i4 { order: 5; }
    .i5 { order: 4; }
    .i6 { order: 3; }
    .i7 { order: 2; }
    .i8 { order: 1; }
  </style>
</head>
<body>
  <p>DOM order 1–8, visual order 8–1:</p>
  <div class="grid">
    <a href="#1" class="i1">1 (visually last)</a>
    <a href="#2" class="i2">2</a>
    <a href="#3" class="i3">3</a>
    <a href="#4" class="i4">4</a>
    <a href="#5" class="i5">5</a>
    <a href="#6" class="i6">6</a>
    <a href="#7" class="i7">7</a>
    <a href="#8" class="i8">8 (visually first)</a>
  </div>
</body>
</html>
