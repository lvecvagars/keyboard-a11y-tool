<!--
  Fully accessible baseline page. Should produce 0 issues across
  all three modules. If this fixture fails, something is wrong
  with the tool, not the page.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fully clean page</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 0;
      margin: 0;
      background: #ffffff;
      color: #111827;
    }

    /* Skip link stays in layout flow with transparent colors until
       focused — avoids the screenshot-diff noise from show/hide. */
    .skip-link {
      display: inline-block;
      padding: 8px 16px;
      text-decoration: none;
      font-weight: bold;
      color: transparent;
      background: transparent;
    }
    .skip-link:focus {
      color: #111827;
      background: #ffffff;
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    nav {
      background: #f1f5f9;
      padding: 12px 20px;
    }
    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 12px;
    }
    nav a {
      display: inline-block;
      padding: 8px 12px;
      background: #e2e8f0;
      text-decoration: none;
      color: #111827;
      border-radius: 4px;
    }

    main {
      padding: 24px 20px;
      max-width: 600px;
    }

    h1 { font-size: 20px; margin-bottom: 16px; }

    /* 3px #2563eb on white ≈ 4.6:1, well above 3:1 minimum */
    a:focus,
    button:focus,
    input:focus {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    form {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 300px;
    }
    input, button {
      padding: 8px 12px;
      font-size: 14px;
    }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <nav>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <main id="main-content" tabindex="-1">
    <h1>Fully accessible page</h1>
    <p>This page should produce zero keyboard accessibility issues.</p>

    <form onsubmit="event.preventDefault()">
      <label>
        Name
        <input type="text" name="name">
      </label>
      <label>
        Email
        <input type="email" name="email">
      </label>
      <button type="submit">Submit</button>
    </form>
  </main>
</body>
</html>
