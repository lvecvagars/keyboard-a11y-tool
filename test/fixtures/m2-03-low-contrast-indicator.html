<!--
  Light-gray outline (#c8c8c8) on white — visible enough for M2-01
  to register but below the 3:1 contrast threshold. Expects ≥1 M2-03.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M2-03 low-contrast indicator</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      background: #ffffff;
    }

    a:focus {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    /* No border, white bg — so only edges in the diff are outline vs page */
    button.low-contrast {
      padding: 8px 16px;
      font-size: 14px;
      background: #ffffff;
      color: #111827;
      border: none;
      outline: none;
    }

    /* #c8c8c8 on white ≈ 1.69:1 contrast (below 3:1).
       outline-offset pushes it into clean white space so the diff
       region is unambiguously outline-vs-background. */
    button.low-contrast:focus {
      outline: 4px solid #c8c8c8;
      outline-offset: 4px;
    }
  </style>
</head>
<body>
  <a href="#top">Reference link (high-contrast focus)</a>

  <p>The button below has a focus indicator with very low contrast:</p>
  <button type="button" class="low-contrast">Low-contrast focus</button>
</body>
</html>
