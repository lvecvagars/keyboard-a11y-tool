<!-- Button with all focus styling stripped. Expects ≥1 M2-01. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M2-01 no focus indicator</title>
  <style>
    body { font-family: sans-serif; padding: 24px; }

    a:focus {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    button.no-indicator {
      padding: 8px 16px;
      font-size: 14px;
      background: #e5e7eb;
      color: #111827;
      border: 1px solid #9ca3af;
      outline: none;
    }
    button.no-indicator:focus {
      background: #e5e7eb;
      color: #111827;
      border: 1px solid #9ca3af;
      outline: none;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <a href="#top">Reference link (has visible focus)</a>

  <p>The button below has no visible focus indicator:</p>
  <button type="button" class="no-indicator">Invisible focus button</button>
</body>
</html>
