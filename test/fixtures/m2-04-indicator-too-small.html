<!--
  FIXTURE: M2-04 focus indicator too small

  The button has a visible, high-contrast focus indicator (M2-01 and
  M2-03 both pass) but it's only a 1px outline — below the WCAG 2.4.13
  minimum area requirement of a 2px perimeter.

  For a typical button (~120×32px), the minimum required area per the
  spec formula is:
    2 * (120 + 32) * 2 = 608 qualifying CSS pixels
  A 1px perimeter produces only:
    2 * (120 + 32) * 1 = 304 qualifying CSS pixels
  That's roughly half the minimum — comfortably below the threshold
  and should produce a reliable M2-04 signal regardless of exact
  button size.

  Reference link uses a 3px outline that clearly meets the area
  requirement.

  Expected: ≥1 M2-04 issue.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M2-04 indicator too small</title>
  <style>
    body { font-family: sans-serif; padding: 24px; }

    /* Reference link — comfortably large focus indicator */
    a:focus {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    button.thin-outline {
      padding: 8px 16px;
      font-size: 14px;
      background: #ffffff;
      color: #111827;
      border: 1px solid #9ca3af;
      outline: none;
    }

    /* High-contrast color but only 1px thick — below minimum area. */
    button.thin-outline:focus {
      outline: 1px solid #2563eb;
      outline-offset: 0;
    }
  </style>
</head>
<body>
  <a href="#top">Reference link (adequate indicator)</a>

  <p>The button below has a visible but too-thin focus indicator:</p>
  <button type="button" class="thin-outline">Thin-outline button</button>
</body>
</html>
