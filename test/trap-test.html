<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Keyboard Trap Test Page</title>
</head>
<body>
  <h1>Keyboard Trap Test</h1>

  <a href="#">Link before trap</a>

  <div id="trap-zone">
    <p>This div traps keyboard focus using JavaScript.</p>
    <button id="btn-a">Button A (trapped)</button>
    <button id="btn-b">Button B (trapped)</button>
  </div>

  <a href="#">Link after trap (should be unreachable)</a>

  <script>
    // Trap: when focus tries to leave the trap zone, force it back
    const trapZone = document.getElementById('trap-zone');
    const btnA = document.getElementById('btn-a');
    const btnB = document.getElementById('btn-b');

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        const active = document.activeElement;
        // If we're on the last trapped element and tabbing forward, wrap to first
        if (!e.shiftKey && active === btnB) {
          e.preventDefault();
          btnA.focus();
        }
        // If we're on the first trapped element and tabbing backward, wrap to last
        if (e.shiftKey && active === btnA) {
          e.preventDefault();
          btnB.focus();
        }
      }
    });
  </script>
</body>
</html>
